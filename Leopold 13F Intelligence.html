  .dot { width: 6px; height: 6px; border-radius: 50%; }

  .seg button { font-family: var(--mono); font-size: 11px; letter-spacing: .03em; text-transform: uppercase; padding: 5px 11px; border: none; cursor: pointer; background: transparent; color: var(--text-dim); font-weight: 600; }

  .htable thead th { font-family: var(--mono); font-size: 10px; letter-spacing: .08em; text-transform: uppercase; color: var(--text-faint); font-weight: 600; text-align: left; padding: 0 10px 10px; border-bottom: 1px solid var(--border); white-space: nowrap; user-select: none; }
  .htable td { padding: 10px; border-bottom: 1px solid color-mix(in oklab, var(--border) 55%, transparent); font-size: 13px; vertical-align: middle; }

  .hrow:hover { background: var(--panel-2); }
  .hrow-open { background: var(--panel-2); }

  .hdetail td { background: var(--panel-2); border-bottom: 1px solid var(--border); }
  .dlabel { font-family: var(--mono); font-size: 10px; letter-spacing: .1em; text-transform: uppercase; color: var(--text-faint); margin-bottom: 8px; }

  .dense .hero { margin: 14px 0; }
  .dense .herocell { padding: 12px 16px; }

  /* ---------------- alerts ---------------- */
  .alert { display: flex; gap: 10px; padding: 10px 11px; border: 1px solid var(--border); border-radius: 9px; cursor: pointer; transition: border-color .1s; background: var(--panel-2); }
  .alert:hover { border-color: color-mix(in oklab, var(--accent) 45%, var(--border)); }

  .marquee { overflow: hidden; border: 1px solid var(--border); border-radius: 9px; background: var(--panel-2); padding: 10px 0; mask-image: linear-gradient(90deg, transparent, #000 4%, #000 96%, transparent); }

  .tickitem { display: inline-flex; align-items: center; gap: 8px; padding: 0 4px; }

function useTweaks(defaults) {
  const [values, setValues] = React.useState(defaults);
  const setTweak = React.useCallback((keyOrEdits, val) => {
    const edits = typeof keyOrEdits === 'object' && keyOrEdits !== null
      ? keyOrEdits : { [keyOrEdits]: val };
    setValues((prev) => ({ ...prev, ...edits }));
    window.parent.postMessage({ type: '__edit_mode_set_keys', edits }, '*');
    window.dispatchEvent(new CustomEvent('tweakchange', { detail: edits }));
  }, []);
  return [values, setTweak];
}

function TweaksPanel({ title = 'Tweaks', children }) {
  const [open, setOpen] = React.useState(false);
  const dragRef = React.useRef(null);
  const offsetRef = React.useRef({ x: 16, y: 16 });
  const PAD = 16;

  const clampToViewport = React.useCallback(() => {
    const panel = dragRef.current;
    if (!panel) return;
    const w = panel.offsetWidth, h = panel.offsetHeight;
    const maxRight = Math.max(PAD, window.innerWidth - w - PAD);
    const maxBottom = Math.max(PAD, window.innerHeight - h - PAD);
    offsetRef.current = {
      x: Math.min(maxRight, Math.max(PAD, offsetRef.current.x)),
      y: Math.min(maxBottom, Math.max(PAD, offsetRef.current.y)),
    };
    panel.style.right = offsetRef.current.x + 'px';
    panel.style.bottom = offsetRef.current.y + 'px';
  }, []);

  React.useEffect(() => {
    if (!open) return;
    clampToViewport();
    const ro = typeof ResizeObserver !== 'undefined' ? new ResizeObserver(clampToViewport) : null;
    if (ro) { ro.observe(document.documentElement); return () => ro.disconnect(); }
    window.addEventListener('resize', clampToViewport);
    return () => window.removeEventListener('resize', clampToViewport);
  }, [open, clampToViewport]);

  React.useEffect(() => {
    const onMsg = (e) => {
      const t = e?.data?.type;
      if (t === '__activate_edit_mode') setOpen(true);
      else if (t === '__deactivate_edit_mode') setOpen(false);
    };
    window.addEventListener('message', onMsg);
    window.parent.postMessage({ type: '__edit_mode_available' }, '*');
    return () => window.removeEventListener('message', onMsg);
  }, []);

  const dismiss = () => {
    setOpen(false);
    window.parent.postMessage({ type: '__edit_mode_dismissed' }, '*');
  };

  const onDragStart = (e) => {
    const panel = dragRef.current;
    if (!panel) return;
    const r = panel.getBoundingClientRect();
    const sx = e.clientX, sy = e.clientY;
    const startRight = window.innerWidth - r.right;
    const startBottom = window.innerHeight - r.bottom;
    const move = (ev) => {
      offsetRef.current = { x: startRight - (ev.clientX - sx), y: startBottom - (ev.clientY - sy) };
      clampToViewport();
    };
    const up = () => { window.removeEventListener('mousemove', move); window.removeEventListener('mouseup', up); };
    window.addEventListener('mousemove', move);
    window.addEventListener('mouseup', up);
  };

  if (!open) return null;
  return (
    <>
      <style>{__TWEAKS_STYLE}</style>
      <div ref={dragRef} className="twk-panel" data-omelette-chrome=""
           style={{ right: offsetRef.current.x, bottom: offsetRef.current.y }}>
        <div className="twk-hd" onMouseDown={onDragStart}>
          <b>{title}</b>
          <button className="twk-x" aria-label="Close tweaks"
                  onMouseDown={(e) => e.stopPropagation()} onClick={dismiss}>✕</button>
        </div>
        <div className="twk-body">{children}</div>
      </div>
    </>
  );
}

function TweakSection({ label, children }) {
  return <><div className="twk-sect">{label}</div>{children}</>;
}

function TweakRow({ label, value, children, inline = false }) {
  return (
    <div className={inline ? 'twk-row twk-row-h' : 'twk-row'}>
      <div className="twk-lbl">
        <span>{label}</span>
        {value != null && <span className="twk-val">{value}</span>}
      </div>
      {children}
    </div>
  );
}

function TweakSlider({ label, value, min = 0, max = 100, step = 1, unit = '', onChange }) {
  return (
    <TweakRow label={label} value={`${value}${unit}`}>
      <input type="range" className="twk-slider" min={min} max={max} step={step}
             value={value} onChange={(e) => onChange(Number(e.target.value))} />
    </TweakRow>
  );
}

function TweakToggle({ label, value, onChange }) {
  return (
    <div className="twk-row twk-row-h">
      <div className="twk-lbl"><span>{label}</span></div>
      <button type="button" className="twk-toggle" data-on={value ? '1' : '0'}
              role="switch" aria-checked={!!value} onClick={() => onChange(!value)}><i /></button>
    </div>
  );
}

function TweakSelect({ label, value, options, onChange }) {
  return (
    <TweakRow label={label}>
      <select className="twk-field" value={value} onChange={(e) => onChange(e.target.value)}>
        {options.map((o) => {
          const v = typeof o === 'object' ? o.value : o;
          const l = typeof o === 'object' ? o.label : o;
          return <option key={v} value={v}>{l}</option>;
        })}
      </select>
    </TweakRow>
  );
}

function TweakRadio({ label, value, options, onChange }) {
  const trackRef = React.useRef(null);
  const [dragging, setDragging] = React.useState(false);
  const valueRef = React.useRef(value);
  valueRef.current = value;
  const labelLen = (o) => String(typeof o === 'object' ? o.label : o).length;
  const maxLen = options.reduce((m, o) => Math.max(m, labelLen(o)), 0);
  const fitsAsSegments = maxLen <= ({ 2: 16, 3: 10 }[options.length] ?? 0);
  if (!fitsAsSegments) {
    const resolve = (s) => {
      const m = options.find((o) => String(typeof o === 'object' ? o.value : o) === s);
      return m === undefined ? s : typeof m === 'object' ? m.value : m;
    };
    return <TweakSelect label={label} value={value} options={options} onChange={(s) => onChange(resolve(s))} />;
  }
  const opts = options.map((o) => (typeof o === 'object' ? o : { value: o, label: o }));
  const idx = Math.max(0, opts.findIndex((o) => o.value === value));
  const n = opts.length;
  const segAt = (clientX) => {
    const r = trackRef.current.getBoundingClientRect();
    const inner = r.width - 4;
    const i = Math.floor(((clientX - r.left - 2) / inner) * n);
    return opts[Math.max(0, Math.min(n - 1, i))].value;
  };
  const onPointerDown = (e) => {
    setDragging(true);
    const v0 = segAt(e.clientX);
    if (v0 !== valueRef.current) onChange(v0);
    const move = (ev) => { if (!trackRef.current) return; const v = segAt(ev.clientX); if (v !== valueRef.current) onChange(v); };
    const up = () => { setDragging(false); window.removeEventListener('pointermove', move); window.removeEventListener('pointerup', up); };
    window.addEventListener('pointermove', move);
    window.addEventListener('pointerup', up);
  };
  return (
    <TweakRow label={label}>
      <div ref={trackRef} role="radiogroup" onPointerDown={onPointerDown}
           className={dragging ? 'twk-seg dragging' : 'twk-seg'}>
        <div className="twk-seg-thumb"
             style={{ left: `calc(2px + ${idx} * (100% - 4px) / ${n})`, width: `calc((100% - 4px) / ${n})` }} />
        {opts.map((o) => (
          <button key={o.value} type="button" role="radio" aria-checked={o.value === value}>{o.label}</button>
        ))}
      </div>
    </TweakRow>
  );
}

function TweakText({ label, value, placeholder, onChange }) {
  return (
    <TweakRow label={label}>
      <input className="twk-field" type="text" value={value} placeholder={placeholder}
             onChange={(e) => onChange(e.target.value)} />
    </TweakRow>
  );
}

function TweakNumber({ label, value, min, max, step = 1, unit = '', onChange }) {
  const clamp = (n) => { if (min != null && n < min) return min; if (max != null && n > max) return max; return n; };
  const startRef = React.useRef({ x: 0, val: 0 });
  const onScrubStart = (e) => {
    e.preventDefault();
    startRef.current = { x: e.clientX, val: value };
    const decimals = (String(step).split('.')[1] || '').length;
    const move = (ev) => { const dx = ev.clientX - startRef.current.x; const raw = startRef.current.val + dx * step; const snapped = Math.round(raw / step) * step; onChange(clamp(Number(snapped.toFixed(decimals)))); };
    const up = () => { window.removeEventListener('pointermove', move); window.removeEventListener('pointerup', up); };
    window.addEventListener('pointermove', move);
    window.addEventListener('pointerup', up);
  };
  return (
    <div className="twk-num">
      <span className="twk-num-lbl" onPointerDown={onScrubStart}>{label}</span>
      <input type="number" value={value} min={min} max={max} step={step}
             onChange={(e) => onChange(clamp(Number(e.target.value)))} />
      {unit && <span className="twk-num-unit">{unit}</span>}
    </div>
  );
}

function __twkIsLight(hex) {
  const h = String(hex).replace('#', '');
  const x = h.length === 3 ? h.replace(/./g, (c) => c + c) : h.padEnd(6, '0');
  const n = parseInt(x.slice(0, 6), 16);
  if (Number.isNaN(n)) return true;
  const r = (n >> 16) & 255, g = (n >> 8) & 255, b = n & 255;
  return r * 299 + g * 587 + b * 114 > 148000;
}

const __TwkCheck = ({ light }) => (
  <svg viewBox="0 0 14 14" aria-hidden="true">
    <path d="M3 7.2 5.8 10 11 4.2" fill="none" strokeWidth="2.2"
          strokeLinecap="round" strokeLinejoin="round"
          stroke={light ? 'rgba(0,0,0,.78)' : '#fff'} />
  </svg>
);

function TweakColor({ label, value, options, onChange }) {
  if (!options || !options.length) {
    return (
      <div className="twk-row twk-row-h">
        <div className="twk-lbl"><span>{label}</span></div>
        <input type="color" className="twk-swatch" value={value} onChange={(e) => onChange(e.target.value)} />
      </div>
    );
  }
  const key = (o) => String(JSON.stringify(o)).toLowerCase();
  const cur = key(value);
  return (
    <TweakRow label={label}>
      <div className="twk-chips" role="radiogroup">
        {options.map((o, i) => {
          const colors = Array.isArray(o) ? o : [o];
          const [hero, ...rest] = colors;
          const sup = rest.slice(0, 4);
          const on = key(o) === cur;
          return (
            <button key={i} type="button" className="twk-chip" role="radio"
                    aria-checked={on} data-on={on ? '1' : '0'}
                    aria-label={colors.join(', ')} title={colors.join(' · ')}
                    style={{ background: hero }} onClick={() => onChange(o)}>
              {sup.length > 0 && <span>{sup.map((c, j) => <i key={j} style={{ background: c }} />)}</span>}
              {on && <__TwkCheck light={__twkIsLight(hero)} />}
            </button>
          );
        })}
      </div>
    </TweakRow>
  );
}

function TweakButton({ label, onClick, secondary = false }) {
  return (
    <button type="button" className={secondary ? 'twk-btn secondary' : 'twk-btn'} onClick={onClick}>{label}</button>
  );
}

Object.assign(window, {
  useTweaks, TweaksPanel, TweakSection, TweakRow,
  TweakSlider, TweakToggle, TweakRadio, TweakSelect,
  TweakText, TweakNumber, TweakColor, TweakButton,
});
</script>

<script type="text/babel">
function fmtMillions(m) {
  if (m == null) return "—";
  if (m >= 1000) return "$" + (m / 1000).toFixed(2) + "B";
  if (m >= 1)    return "$" + Math.round(m) + "M";
  return "$" + (m * 1000).toFixed(0) + "K";
}
function fmtUSDFull(d) { return "$" + d.toLocaleString("en-US"); }
function fmtShares(n) {
  if (n == null) return "—";
  if (n >= 1e6) return (n / 1e6).toFixed(2) + "M";
  if (n >= 1e3) return (n / 1e3).toFixed(0) + "K";
  return String(n);
}
function fmtPct(p, digits) {
  if (p == null) return "—";
  const d = digits == null ? 1 : digits;
  return (p > 0 ? "+" : "") + p.toFixed(d) + "%";
}
function timeAgo(ts) {
  const now = new Date("2026-06-03T12:00:00-04:00").getTime();
  const t = new Date(ts).getTime();
  const mins = Math.round((now - t) / 60000);
  if (mins < 60) return mins + "m ago";
  const hrs = Math.round(mins / 60);
  if (hrs < 24) return hrs + "h ago";
  const days = Math.round(hrs / 24);
  if (days < 14) return days + "d ago";
  return Math.round(days / 7) + "w ago";
}
function fmtDate(s) {
  const d = new Date(s + (s.length === 10 ? "T00:00:00" : ""));
  return d.toLocaleDateString("en-US", { year: "numeric", month: "short", day: "numeric" });
}

function TypeTag({ type }) {
  const map = {
    STOCK: { t: "STK",  c: "var(--text-dim)", b: "var(--border)" },
    CALL:  { t: "CALL", c: "var(--up)",       b: "color-mix(in oklab, var(--up) 40%, transparent)" },
    PUT:   { t: "PUT",  c: "var(--down)",     b: "color-mix(in oklab, var(--down) 40%, transparent)" }
  };
  const s = map[type] || map.STOCK;
  return (
    <span style={{ fontFamily:"var(--mono)", fontSize:10, fontWeight:600, letterSpacing:".06em",
      color:s.c, border:"1px solid "+s.b, borderRadius:4, padding:"1px 5px", lineHeight:1.4, whiteSpace:"nowrap" }}>
      {s.t}
    </span>
  );
}

function ChangeBadge({ change, deltaPct, compact }) {
  const map = {
    NEW:       { label:"NEW",  glyph:"✦", color:"var(--accent)" },
    INCREASED: { label:"ADD",  glyph:"▲", color:"var(--up)" },
    DECREASED: { label:"TRIM", glyph:"▼", color:"var(--down)" },
    EXITED:    { label:"EXIT", glyph:"✕", color:"var(--down)" },
    HELD:      { label:"HOLD", glyph:"—", color:"var(--text-faint)" }
  };
  const s = map[change] || map.HELD;
  return (
    <span style={{ display:"inline-flex", alignItems:"center", gap:5, color:s.color,
      fontFamily:"var(--mono)", fontSize:11, fontWeight:600, whiteSpace:"nowrap" }}>
      <span style={{ fontSize:9 }}>{s.glyph}</span>
      <span>{s.label}</span>
      {!compact && deltaPct != null && change !== "HELD" && (
        <span style={{ color:"var(--text-dim)", fontWeight:500 }}>{fmtPct(deltaPct, 0)}</span>
      )}
    </span>
  );
}

function VerifiedDot({ note }) {
  return (
    <span title={note || "Figure from the filing"} style={{
      display:"inline-flex", alignItems:"center", justifyContent:"center",
      width:14, height:14, borderRadius:"50%",
      background:"color-mix(in oklab, var(--accent) 18%, transparent)",
      color:"var(--accent)", fontSize:9, fontWeight:700, cursor:"help", flexShrink:0
    }}>✓</span>
  );
}

function LayerDot({ layer }) {
  const L = window.LAYERS[layer];
  if (!L) return null;
  return <span title={L.label} style={{ width:8, height:8, borderRadius:2, background:L.color, display:"inline-block", flexShrink:0 }} />;
}

function Chip({ active, onClick, children }) {
  return (
    <button onClick={onClick} style={{
      fontFamily:"var(--mono)", fontSize:11, fontWeight:500, letterSpacing:".02em",
      padding:"5px 10px", borderRadius:6, cursor:"pointer", whiteSpace:"nowrap",
      border:"1px solid "+(active ? "var(--accent)" : "var(--border)"),
      background: active ? "color-mix(in oklab, var(--accent) 15%, transparent)" : "transparent",
      color: active ? "var(--accent)" : "var(--text-dim)",
      transition:"all .12s ease"
    }}>{children}</button>
  );
}

function Sparkline({ data, width, height, color, fill }) {
  const w = width || 120, h = height || 28;
  const max = Math.max(...data), min = Math.min(...data);
  const range = max - min || 1;
  const pts = data.map((v, i) => {
    const x = (i / (data.length - 1)) * (w - 2) + 1;
    const y = h - 2 - ((v - min) / range) * (h - 4);
    return [x, y];
  });
  const line = pts.map((p, i) => (i === 0 ? "M" : "L") + p[0].toFixed(1) + " " + p[1].toFixed(1)).join(" ");
  const area = line + ` L${(w - 1).toFixed(1)} ${h - 1} L1 ${h - 1} Z`;
  const c = color || "var(--accent)";
  return (
    <svg width={w} height={h} style={{ display:"block", overflow:"visible" }}>
      {fill && <path d={area} fill={c} opacity="0.10" />}
      <path d={line} fill="none" stroke={c} strokeWidth="1.5" strokeLinejoin="round" strokeLinecap="round" />
      <circle cx={pts[pts.length - 1][0]} cy={pts[pts.length - 1][1]} r="2" fill={c} />
    </svg>
  );
}

function PanelHead({ kicker, title, right }) {
  return (
    <div style={{ display:"flex", alignItems:"baseline", justifyContent:"space-between", gap:12, marginBottom:14 }}>
      <div>
        {kicker && <div style={{ fontFamily:"var(--mono)", fontSize:10, letterSpacing:".14em", color:"var(--text-faint)", textTransform:"uppercase", marginBottom:4 }}>{kicker}</div>}
        <h2 style={{ margin:0, fontSize:16, fontWeight:600, letterSpacing:"-.01em", color:"var(--text)" }}>{title}</h2>
      </div>
      {right}
    </div>
  );
}

Object.assign(window, { fmtMillions, fmtUSDFull, fmtShares, fmtPct, timeAgo, fmtDate, TypeTag, ChangeBadge, VerifiedDot, LayerDot, Chip, Sparkline, PanelHead });
</script>

<script type="text/babel">
function _worst(row, side) {
  let sum = 0, max = -Infinity, min = Infinity;
  for (const r of row) { sum += r._a; if (r._a > max) max = r._a; if (r._a < min) min = r._a; }
  const s2 = sum * sum, side2 = side * side;
  return Math.max((side2 * max) / s2, s2 / (side2 * min));
}

function squarify(items, X, Y, W, H) {
  const total = items.reduce((s, it) => s + it.value, 0) || 1;
  const nodes = items.map(it => ({ ...it, _a: (it.value / total) * W * H }));
  const out = [];
  let x = X, y = Y, w = W, h = H, i = 0;
  while (i < nodes.length) {
    const side = Math.min(w, h);
    let row = [nodes[i]];
    let best = _worst(row, side);
    let j = i + 1;
    while (j < nodes.length) {
      const cand = row.concat(nodes[j]);
      const wr = _worst(cand, side);
      if (wr > best) break;
      row = cand; best = wr; j++;
    }
    const sum = row.reduce((s, r) => s + r._a, 0);
    if (w <= h) {
      const stripH = sum / w; let cx = x;
      for (const r of row) { const cw = r._a / stripH; out.push({ ...r, x:cx, y, w:cw, h:stripH }); cx += cw; }
      y += stripH; h -= stripH;
    } else {
      const stripW = sum / h; let cy = y;
      for (const r of row) { const ch = r._a / stripW; out.push({ ...r, x, y:cy, w:stripW, h:ch }); cy += ch; }
      x += stripW; w -= stripW;
    }
    i = j;
  }
  return out;
}

function colorFor(h, mode) {
  if (mode === "longshort") return h.type === "PUT" ? "var(--down)" : (h.type === "CALL" ? "var(--up)" : "var(--accent)");
  if (mode === "change") {
    const m = { NEW:"var(--accent)", INCREASED:"var(--up)", DECREASED:"var(--down)", HELD:"var(--text-faint)" };
    return m[h.change] || "var(--text-faint)";
  }
  return window.LAYERS[h.layer] ? window.LAYERS[h.layer].color : "var(--text-faint)";
}

function Treemap({ holdings, colorMode, onPick, active }) {
  const W = 760, H = 360;
  const items = [...holdings].sort((a, b) => b.value - a.value);
  const cells = squarify(items, 0, 0, W, H);
  return (
    <svg viewBox={`0 0 ${W} ${H}`} style={{ width:"100%", height:"auto", display:"block" }}>
      {cells.map((c) => {
        const col = colorFor(c, colorMode);
        const big = c.w > 56 && c.h > 30;
        const med = c.w > 38 && c.h > 18;
        const isActive = active === c.ticker;
        return (
          <g key={c.ticker} onClick={() => onPick && onPick(c)} style={{ cursor:"pointer" }}>
            <rect x={c.x+1} y={c.y+1} width={Math.max(0,c.w-2)} height={Math.max(0,c.h-2)}
              rx="3" fill={col} fillOpacity={c.type==="PUT" ? 0.30 : 0.85}
              stroke={isActive ? "var(--text)" : col} strokeOpacity={isActive ? 1 : 0.5}
              strokeWidth={isActive ? 2 : 1} />
            {med && (
              <text x={c.x+7} y={c.y+16} fill={c.type==="PUT" ? col : "#0a0e14"}
                style={{ fontFamily:"var(--mono)", fontSize:big?13:11, fontWeight:700 }}>
                {c.ticker.replace(".C","")}{c.type!=="STOCK" ? "·"+(c.type==="PUT"?"P":"C") : ""}
              </text>
            )}
            {big && (
              <text x={c.x+7} y={c.y+31} fill={c.type==="PUT" ? "var(--text-dim)" : "rgba(10,14,20,.7)"}
                style={{ fontFamily:"var(--mono)", fontSize:10, fontWeight:600 }}>
                {window.fmtMillions(c.value)}
              </text>
            )}
          </g>
        );
      })}
    </svg>
  );
}

function SectorBar({ holdings }) {
  const bySector = {};
  holdings.forEach(h => {
    if (!bySector[h.sector]) bySector[h.sector] = { sector:h.sector, value:0 };
    bySector[h.sector].value += h.value;
  });
  const rows = Object.values(bySector).sort((a, b) => b.value - a.value);
  const max = Math.max(...rows.map(r => r.value));
  return (
    <div style={{ display:"flex", flexDirection:"column", gap:9 }}>
      {rows.map(r => {
        const isShort = r.sector.startsWith("Hedge");
        const col = isShort ? "var(--down)" : "var(--accent)";
        return (
          <div key={r.sector} style={{ display:"grid", gridTemplateColumns:"150px 1fr 78px", alignItems:"center", gap:12 }}>
            <div style={{ fontSize:12, color:"var(--text-dim)", textAlign:"right", whiteSpace:"nowrap", overflow:"hidden", textOverflow:"ellipsis" }}>{r.sector}</div>
            <div style={{ height:22, background:"var(--panel-2)", borderRadius:4, overflow:"hidden" }}>
              <div style={{ width:(r.value/max*100)+"%", height:"100%", background:col, opacity:isShort?.45:.85, borderRadius:4, transition:"width .4s ease" }} />
            </div>
            <div style={{ fontFamily:"var(--mono)", fontSize:12, color:"var(--text)", textAlign:"right" }}>{window.fmtMillions(r.value)}</div>
          </div>
        );
      })}
    </div>
  );
}

function Donut({ holdings }) {
  const byLayer = {};
  holdings.forEach(h => { if (!byLayer[h.layer]) byLayer[h.layer]=0; byLayer[h.layer]+=h.value; });
  const total = Object.values(byLayer).reduce((s,v) => s+v, 0);
  const entries = Object.entries(byLayer).sort((a,b) => b[1]-a[1]);
  let acc = 0;
  const R=120, r=74, cx=140, cy=140;
  const segs = entries.map(([layer, val]) => {
    const frac = val/total;
    const a0 = acc*2*Math.PI - Math.PI/2;
    acc += frac;
    const a1 = acc*2*Math.PI - Math.PI/2;
    const large = frac > 0.5 ? 1 : 0;
    const p = (ang, rad) => [cx+rad*Math.cos(ang), cy+rad*Math.sin(ang)];
    const [x0,y0]=p(a0,R),[x1,y1]=p(a1,R),[x2,y2]=p(a1,r),[x3,y3]=p(a0,r);
    return { layer, val, frac, d:`M${x0} ${y0} A${R} ${R} 0 ${large} 1 ${x1} ${y1} L${x2} ${y2} A${r} ${r} 0 ${large} 0 ${x3} ${y3} Z`, color:window.LAYERS[layer].color };
  });
  return (
    <div style={{ display:"flex", gap:22, alignItems:"center", flexWrap:"wrap" }}>
      <svg viewBox="0 0 280 280" style={{ width:220, height:220, flexShrink:0 }}>
        {segs.map(s => <path key={s.layer} d={s.d} fill={s.color} fillOpacity={s.layer==="shorts"?0.4:0.85} stroke="var(--panel)" strokeWidth="1.5" />)}
        <text x="140" y="132" textAnchor="middle" style={{ fontFamily:"var(--mono)", fontSize:22, fontWeight:700, fill:"var(--text)" }}>{window.fmtMillions(total)}</text>
        <text x="140" y="152" textAnchor="middle" style={{ fontFamily:"var(--mono)", fontSize:10, fill:"var(--text-faint)", letterSpacing:".1em" }}>GROSS BOOK</text>
      </svg>
      <div style={{ display:"flex", flexDirection:"column", gap:7, minWidth:180 }}>
        {segs.map(s => (
          <div key={s.layer} style={{ display:"flex", alignItems:"center", gap:9 }}>
            <span style={{ width:10, height:10, borderRadius:2, background:s.color, opacity:s.layer==="shorts"?.5:1, flexShrink:0 }} />
            <span style={{ fontSize:12, color:"var(--text-dim)", flex:1 }}>{window.LAYERS[s.layer].label}</span>
            <span style={{ fontFamily:"var(--mono)", fontSize:11, color:"var(--text)" }}>{(s.frac*100).toFixed(0)}%</span>
          </div>
        ))}
      </div>
    </div>
  );
}

Object.assign(window, { Treemap, SectorBar, Donut });
</script>

<script type="text/babel">
function genHistory(h) {
  const v = h.value;
  switch (h.change) {
    case "NEW":       return [0, 0, 0, 0, 0, v];
    case "INCREASED": return [0, v*.18, v*.34, v*.52, v*.74, v];
    case "DECREASED": return [v*1.7, v*1.55, v*1.42, v*1.3, v*1.18, v];
    default:          return [v*.92, v*.97, v*1.05, v*.99, v*1.02, v];
  }
}

function HoldingRow({ h, pct, expanded, onToggle }) {
  const hist = genHistory(h);
  const histColor = h.type === "PUT" ? "var(--down)" : (h.change === "DECREASED" ? "var(--down)" : "var(--up)");
  return (
    <>
      <tr onClick={onToggle} className={"hrow" + (expanded ? " hrow-open" : "")}>
        <td style={{ paddingLeft:16 }}>
          <div style={{ display:"flex", alignItems:"center", gap:10 }}>
            <LayerDot layer={h.layer} />
            <div style={{ minWidth:0 }}>
              <div style={{ display:"flex", alignItems:"center", gap:6 }}>
                <span style={{ fontFamily:"var(--mono)", fontWeight:700, fontSize:13, color:"var(--text)" }}>{h.ticker.replace(".C","")}</span>
                {h.verified && <VerifiedDot note={h.note} />}
              </div>
              <div style={{ fontSize:11, color:"var(--text-faint)", whiteSpace:"nowrap", overflow:"hidden", textOverflow:"ellipsis", maxWidth:180 }}>{h.name}</div>
            </div>
          </div>
        </td>
        <td><TypeTag type={h.type} /></td>
        <td className="num">{fmtShares(h.shares)}</td>
        <td className="num" style={{ fontWeight:600, color:"var(--text)" }}>{fmtMillions(h.value)}</td>
        <td className="num">
          <div style={{ display:"flex", alignItems:"center", justifyContent:"flex-end", gap:8 }}>
            <div style={{ width:42, height:5, background:"var(--panel-2)", borderRadius:3, overflow:"hidden" }}>
              <div style={{ width:Math.min(100,pct/16*100)+"%", height:"100%", background:h.type==="PUT"?"var(--down)":"var(--accent)", opacity:h.type==="PUT"?.5:.85 }} />
            </div>
            <span style={{ minWidth:38, textAlign:"right" }}>{pct.toFixed(1)}%</span>
          </div>
        </td>
        <td style={{ paddingRight:16 }}><ChangeBadge change={h.change} deltaPct={h.deltaPct} /></td>
      </tr>
      {expanded && (
        <tr className="hdetail">
          <td colSpan={6} style={{ padding:0 }}>
            <div style={{ display:"grid", gridTemplateColumns:"1.4fr 1fr 1fr", gap:22, padding:"16px 16px 20px 38px" }}>
              <div>
                <div className="dlabel">Position history · value across filings</div>
                <Sparkline data={hist} width={240} height={46} color={histColor} fill />
                <div style={{ display:"flex", justifyContent:"space-between", fontFamily:"var(--mono)", fontSize:9.5, color:"var(--text-faint)", marginTop:4, width:240 }}>
                  <span>Q4'24</span><span>Q2'25</span><span>Q4'25</span><span>Q1'26</span>
                </div>
              </div>
              <div>
                <div className="dlabel">Thesis layer</div>
                <div style={{ display:"flex", alignItems:"center", gap:8, marginBottom:12 }}>
                  <LayerDot layer={h.layer} />
                  <span style={{ fontSize:13, color:"var(--text)" }}>{window.LAYERS[h.layer].label}</span>
                </div>
                <div className="dlabel">Change vs Q4 2025</div>
                <div style={{ fontSize:12.5, color:"var(--text-dim)", lineHeight:1.5 }}>
                  <ChangeBadge change={h.change} deltaPct={h.deltaPct} />
                  {h.note && <div style={{ marginTop:6 }}>{h.note}</div>}
                </div>
              </div>
              <div>
                <div className="dlabel">Reported in filing</div>
                <div style={{ fontFamily:"var(--mono)", fontSize:12, color:"var(--text-dim)", lineHeight:1.8 }}>
                  <div>Value&nbsp;&nbsp;<span style={{ color:"var(--text)" }}>{fmtMillions(h.value)}</span></div>
                  <div>Shares&nbsp;<span style={{ color:"var(--text)" }}>{fmtShares(h.shares)}</span></div>
                  <div>Type&nbsp;&nbsp;&nbsp;<span style={{ color:"var(--text)" }}>{h.type==="PUT"?"Put option":h.type==="CALL"?"Call option":"Common stock"}</span></div>
                </div>
                {h.type !== "STOCK" && <div style={{ marginTop:8, fontSize:10.5, color:"var(--warn)", lineHeight:1.4 }}>⚠ Notional option exposure — not the same as reported 13F value. Strike & expiry are not disclosed in 13F.</div>}
                {!h.verified && <div style={{ marginTop:8, fontSize:10.5, color:"var(--text-faint)", lineHeight:1.4 }}>≈ Line-level value is a representative reconstruction.</div>}
              </div>
            </div>
          </td>
        </tr>
      )}
    </>
  );
}

function HoldingsTable({ holdings, total, sort, setSort }) {
  const [open, setOpen] = React.useState(null);
  const cols = [
    { k:"name",   label:"Holding",   align:"left" },
    { k:"type",   label:"Type",      align:"left" },
    { k:"shares", label:"Shares",    align:"right" },
    { k:"value",  label:"Value",     align:"right" },
    { k:"pct",    label:"% Port",    align:"right" },
    { k:"change", label:"Δ vs prior",align:"left" }
  ];
  return (
    <div className="tablewrap">
      <table className="htable">
        <thead>
          <tr>
            {cols.map(c => (
              <th key={c.k} onClick={() => c.k!=="type" && c.k!=="change" && setSort(c.k)}
                style={{ textAlign:c.align, cursor:(c.k!=="type"&&c.k!=="change")?"pointer":"default", paddingLeft:c.k==="name"?16:undefined, paddingRight:c.k==="change"?16:undefined }}>
                {c.label}{sort===c.k?" ↓":""}
              </th>
            ))}
          </tr>
        </thead>
        <tbody>
          {holdings.map(h => (
            <HoldingRow key={h.ticker} h={h} pct={h.value/total*100}
              expanded={open===h.ticker} onToggle={() => setOpen(open===h.ticker ? null : h.ticker)} />
          ))}
        </tbody>
      </table>
      {holdings.length === 0 && <div style={{ padding:"40px 16px", textAlign:"center", color:"var(--text-faint)", fontSize:13 }}>No holdings match the current filters.</div>}
    </div>
  );
}

function ChangeCards() {
  const s = window.CHANGE_SUMMARY;
  const cards = [
    { k:"new",  label:"New positions", n:s.counts.new,       color:"var(--accent)", glyph:"✦" },
    { k:"inc",  label:"Increased",     n:s.counts.increased, color:"var(--up)",     glyph:"▲" },
    { k:"dec",  label:"Decreased",     n:s.counts.decreased, color:"var(--down)",   glyph:"▼" },
    { k:"exit", label:"Exited",        n:s.counts.exited,    color:"var(--down)",   glyph:"✕" }
  ];
  return (
    <div style={{ display:"grid", gridTemplateColumns:"repeat(4,1fr)", gap:10 }}>
      {cards.map(c => (
        <div key={c.k} className="kcard">
          <div style={{ display:"flex", alignItems:"center", gap:6, color:c.color, fontSize:11, fontFamily:"var(--mono)", fontWeight:600 }}>
            <span style={{ fontSize:9 }}>{c.glyph}</span>{c.label}
          </div>
          <div style={{ fontFamily:"var(--mono)", fontSize:30, fontWeight:700, color:"var(--text)", marginTop:4, lineHeight:1 }}>{c.n}</div>
        </div>
      ))}
    </div>
  );
}

function AlertsFeed() {
  const [alerts, setAlerts] = React.useState(window.ALERTS);
  const unread = alerts.filter(a => a.status==="UNREAD").length;
  const sevColor = { high:"var(--down)", medium:"var(--warn)", low:"var(--text-dim)" };
  const markRead = (id) => setAlerts(alerts.map(a => a.id===id ? {...a,status:"READ"} : a));
  return (
    <div className="panel">
      <PanelHead kicker="Material changes" title="Alerts"
        right={<span style={{ fontFamily:"var(--mono)", fontSize:11, color:"var(--accent)", background:"color-mix(in oklab, var(--accent) 14%, transparent)", padding:"3px 8px", borderRadius:20 }}>{unread} unread</span>} />
      <div style={{ display:"flex", flexDirection:"column", gap:8 }}>
        {alerts.map(a => (
          <div key={a.id} onClick={() => markRead(a.id)} className="alert" style={{ opacity:a.status==="READ"?.55:1 }}>
            <div style={{ width:3, alignSelf:"stretch", borderRadius:3, background:sevColor[a.severity], flexShrink:0 }} />
            <div style={{ flex:1, minWidth:0 }}>
              <div style={{ display:"flex", alignItems:"center", gap:8, marginBottom:3 }}>
                <span style={{ fontFamily:"var(--mono)", fontSize:11, fontWeight:700, color:"var(--text)" }}>{a.ticker}</span>
                <span style={{ fontFamily:"var(--mono)", fontSize:9.5, letterSpacing:".06em", color:sevColor[a.severity], border:"1px solid "+sevColor[a.severity], borderRadius:3, padding:"0 5px" }}>{a.type.replace("_"," ")}</span>
                {a.status==="UNREAD" && <span style={{ width:6, height:6, borderRadius:"50%", background:"var(--accent)" }} />}
                <span style={{ marginLeft:"auto", fontFamily:"var(--mono)", fontSize:10, color:"var(--text-faint)" }}>{timeAgo(a.ts)}</span>
              </div>
              <div style={{ fontSize:12, color:"var(--text-dim)", lineHeight:1.45 }}>{a.message}</div>
            </div>
          </div>
        ))}
      </div>
    </div>
  );
}

Object.assign(window, { HoldingsTable, ChangeCards, AlertsFeed });
</script>

function NewsFeed({ news, filter, setFilter, allTickers }) {

              {n.tickers.slice(0,3).map(t => <span key={t} className="ticktag">{t}</span>)}
            </div>
            <div style={{ flex:1, minWidth:0 }}>
              <div style={{ fontSize:13, color:"var(--text)", lineHeight:1.4, marginBottom:3 }}>{n.headline}</div>
              <div style={{ fontFamily:"var(--mono)", fontSize:11, color:"var(--text-faint)" }}>
                {n.source} · {timeAgo(n.ts)}
                <span style={{ marginLeft:8, color:"var(--accent)" }}>open ↗</span>
              </div>
            </div>
          </a>
        ))}
        {news.length===0 && <div style={{ padding:"24px 0", textAlign:"center", color:"var(--text-faint)", fontSize:13 }}>No coverage for this ticker yet.</div>}
      </div>
    </div>
  );
}

function NewsModule({ mode, setMode }) {
  const [filter, setFilter] = React.useState(null);
  const all = window.NEWS;
  const allTickers = Array.from(new Set(all.flatMap(n => n.tickers))).sort();
  const filtered = (filter ? all.filter(n => n.tickers.includes(filter)) : all)
    .slice().sort((a, b) => new Date(b.ts) - new Date(a.ts));
  return (
    <div className="panel">
      <PanelHead kicker="Across all portfolio tickers" title="Unified news"
        right={
          <div style={{ display:"flex", gap:0, border:"1px solid var(--border)", borderRadius:7, overflow:"hidden" }}>
            {["marquee","feed"].map(m => (
              <button key={m} onClick={() => setMode(m)} style={{
                fontFamily:"var(--mono)", fontSize:11, letterSpacing:".04em", textTransform:"uppercase",
                padding:"5px 12px", border:"none", cursor:"pointer",
                background: mode===m ? "var(--accent)" : "transparent",
                color: mode===m ? "#06080c" : "var(--text-dim)", fontWeight:600
              }}>{m}</button>
            ))}
          </div>
        } />
      {mode==="marquee"
        ? <div>
            <Marquee news={all} />
            <div style={{ marginTop:10, fontSize:11, color:"var(--text-faint)", fontFamily:"var(--mono)" }}>
              ↔ live tape · hover to pause · {all.length} sources · switch to Feed to filter by ticker
            </div>
          </div>
        : <NewsFeed news={filtered} filter={filter} setFilter={setFilter} allTickers={allTickers} />}
    </div>
  );
}

Object.assign(window, { NewsModule });
</script>

<!-- ── main app ── -->
<script type="text/babel">
const { useState, useMemo } = React;

const THEMES = {
  carbon:   { "--bg":"#0a0e14","--panel":"#11161f","--panel-2":"#161d28","--border":"#222b38","--text":"#e6edf3","--text-dim":"#8a97a6","--text-faint":"#5a6675" },
  midnight: { "--bg":"#080b1a","--panel":"#0f1430","--panel-2":"#151b3c","--border":"#252c52","--text":"#e7e9f7","--text-dim":"#9095bb","--text-faint":"#5e6390" },
  slate:    { "--bg":"#14181d","--panel":"#1b2028","--panel-2":"#222933","--border":"#2f3947","--text":"#e8edf2","--text-dim":"#9aa5b2","--text-faint":"#6b7785" },
  paper:    { "--bg":"#f3f5f9","--panel":"#ffffff","--panel-2":"#eef2f7","--border":"#e0e6ee","--text":"#111722","--text-dim":"#586472","--text-faint":"#95a0ad" }
};
const ACCENTS = { blue:"#2f6df6", green:"#1ec46a", gold:"#c9a227", violet:"#7c5cff" };

const TWEAK_DEFAULTS = {
  "theme": "carbon",
  "accent": "#2f6df6",
  "density": "regular",
  "defaultNews": "marquee",
  "defaultAlloc": "treemap"
};

function App() {
  const [t, setTweak] = useTweaks(TWEAK_DEFAULTS);
  const F = window.FUND;
  const H = window.HOLDINGS;

  const [search, setSearch] = useState("");
  const [sector, setSector] = useState(null);
  const [typeF, setTypeF] = useState("ALL");
  const [sort, setSort] = useState("value");
  const [allocMode, setAllocMode] = useState(t.defaultAlloc);
  const [colorMode, setColorMode] = useState("layer");
  const [newsMode, setNewsMode] = useState(t.defaultNews);
  const [picked, setPicked] = useState(null);

  const sectors = useMemo(() => Array.from(new Set(H.map(h => h.sector))), []);
  const totalAll = useMemo(() => H.reduce((s, h) => s + h.value, 0), []);
  const longVal = useMemo(() => H.filter(h => h.type !== "PUT").reduce((s, h) => s + h.value, 0), []);
  const shortVal = totalAll - longVal;

  const filtered = useMemo(() => {
    let r = H.filter(h => {
      if (typeF !== "ALL" && h.type !== typeF) return false;
      if (sector && h.sector !== sector) return false;
      if (search) {
        const q = search.toLowerCase();
        if (!h.ticker.toLowerCase().includes(q) && !h.name.toLowerCase().includes(q)) return false;
      }
      return true;
    });
    r = r.slice().sort((a, b) => {
      if (sort === "name") return a.ticker.localeCompare(b.ticker);
      if (sort === "shares") return (b.shares||0) - (a.shares||0);
      return b.value - a.value;
    });
    return r;
  }, [search, sector, typeF, sort]);

  const themeVars = { ...THEMES[t.theme], "--accent":t.accent, "--up":"#1ec46a", "--down":"#e2554f", "--warn":"#f6a92f" };
  const fundSeries = window.FILINGS.map(f => f.value000/1000).reverse();

  return (
    <div className="app" style={{ ...themeVars, color:"var(--text)", background:"var(--bg)", minHeight:"100vh" }}>
      <div className={t.density==="compact" ? "dense" : ""}>

        <header className="topbar">
          <div className="wrap">
            <div className="brandrow">
              <div className="mark"><span>SA</span></div>
              <div style={{ flex:1, minWidth:0 }}>
                <div style={{ display:"flex", alignItems:"center", gap:10, flexWrap:"wrap" }}>
                  <h1 style={{ margin:0, fontSize:18, fontWeight:600, letterSpacing:"-.01em" }}>{F.name}</h1>
                  <span className="pill" style={{ color:"var(--accent)", borderColor:"color-mix(in oklab, var(--accent) 40%, transparent)" }}>13F-HR · {F.periodOfReport}</span>
                </div>
                <div style={{ fontSize:12.5, color:"var(--text-dim)", marginTop:2 }}>{F.manager} · {F.location} · CIK {F.cik}</div>
              </div>
              <div style={{ display:"flex", alignItems:"center", gap:14, flexWrap:"wrap", justifyContent:"flex-end" }}>
                <span className="metachip"><span className="dot" style={{ background:"var(--up)" }} />Holdings <b>fresh</b><span style={{ color:"var(--text-faint)" }}>· filed {fmtDate(F.dateFiled)}</span></span>
                <span className="pill" style={{ color:"var(--warn)", borderColor:"color-mix(in oklab, var(--warn) 35%, transparent)" }}>Research, not investment advice</span>
              </div>
            </div>

            <div className="controls">
              <div className="selwrap">
                <select value="Q1 2026" onChange={() => {}} title="Filing period">
                  {window.FILINGS.map(f => <option key={f.q}>{f.q}</option>)}
                </select>
              </div>
              <div className="seg">
                {["ALL","STOCK","CALL","PUT"].map(x => (
                  <button key={x} className={typeF===x?"on":""} onClick={() => setTypeF(x)}>{x==="STOCK"?"STK":x}</button>
                ))}
              </div>
              <div style={{ display:"flex", gap:6, flexWrap:"wrap", flex:1 }}>
                {sectors.map(s => <Chip key={s} active={sector===s} onClick={() => setSector(sector===s?null:s)}>{s}</Chip>)}
              </div>
              <div className="search">
                <span style={{ color:"var(--text-faint)", fontFamily:"var(--mono)", fontSize:12 }}>⌕</span>
                <input value={search} onChange={e => setSearch(e.target.value)} placeholder="ticker / name" />
              </div>
            </div>
          </div>
        </header>

        <main className="wrap">
          <div className="hero">
            <div className="herocell">
              <div className="herolabel">Reported 13F value · Q1 2026</div>
              <div style={{ display:"flex", alignItems:"flex-end", gap:14, flexWrap:"wrap" }}>
                <div className="herobig" style={{ fontSize:34 }}>$13.68B</div>
                <div style={{ marginBottom:2 }}>
                  <Sparkline data={fundSeries} width={130} height={34} color="var(--accent)" fill />
                  <div style={{ fontFamily:"var(--mono)", fontSize:9.5, color:"var(--text-faint)", marginTop:2 }}>Q4'24 → Q1'26 · ~22×</div>
                </div>
              </div>
              <div style={{ fontFamily:"var(--mono)", fontSize:10.5, color:"var(--text-faint)", marginTop:8 }}>Whole-dollar units (post-2023). Gross book incl. listed options.</div>
            </div>
            <div className="herocell">
              <div className="herolabel">Holdings</div>
              <div className="herobig" style={{ fontSize:34 }}>42</div>
              <div style={{ fontFamily:"var(--mono)", fontSize:11, color:"var(--up)", marginTop:8 }}>▲ +13 vs Q4 2025 (29)</div>
            </div>
            <div className="herocell">
              <div className="herolabel">Long vs short</div>
              <div style={{ display:"flex", height:14, borderRadius:4, overflow:"hidden", marginTop:4, marginBottom:8 }}>
                <div style={{ width:(longVal/totalAll*100)+"%", background:"var(--accent)" }} />
                <div style={{ width:(shortVal/totalAll*100)+"%", background:"color-mix(in oklab, var(--down) 60%, transparent)" }} />
              </div>
              <div style={{ fontFamily:"var(--mono)", fontSize:11, color:"var(--text-dim)" }}>
                <span style={{ color:"var(--accent)" }}>{fmtMillions(longVal)} long</span> · <span style={{ color:"var(--down)" }}>{fmtMillions(shortVal)} puts</span>
              </div>
            </div>
            <div className="herocell">
              <div className="herolabel">Filing cadence</div>
              <div style={{ fontFamily:"var(--mono)", fontSize:13, color:"var(--text)", lineHeight:1.6 }}>
                <div>Filed <b>{fmtDate(F.dateFiled)}</b></div>
                <div style={{ color:"var(--text-dim)" }}>Next due <b style={{ color:"var(--warn)" }}>{fmtDate(F.nextFilingDue)}</b></div>
              </div>
              <a href={F.indexUrl} target="_blank" rel="noopener noreferrer" style={{ fontFamily:"var(--mono)", fontSize:10.5, color:"var(--accent)", marginTop:8, display:"inline-block" }}>SEC filing index ↗</a>
            </div>
          </div>

          <div className="grid2">
            <div className="panel">
              <PanelHead kicker="Portfolio allocation" title="Where the book sits"
                right={
                  <div style={{ display:"flex", gap:8, flexWrap:"wrap" }}>
                    {allocMode==="treemap" && (
                      <div className="seg">
                        {[["layer","Layer"],["longshort","L/S"],["change","Δ"]].map(([k,l]) => (
                          <button key={k} className={colorMode===k?"on":""} onClick={() => setColorMode(k)}>{l}</button>
                        ))}
                      </div>
                    )}
                    <div className="seg">
                      {[["treemap","Map"],["sector","Bars"],["donut","Donut"]].map(([k,l]) => (
                        <button key={k} className={allocMode===k?"on":""} onClick={() => setAllocMode(k)}>{l}</button>
                      ))}
                    </div>
                  </div>
                } />
              {allocMode==="treemap" && <Treemap holdings={H} colorMode={colorMode} active={picked} onPick={(c) => { setPicked(c.ticker); setSearch(c.ticker.replace(".C","")); }} />}
              {allocMode==="sector"  && <SectorBar holdings={H} />}
              {allocMode==="donut"   && <Donut holdings={H} />}
              <Legend mode={allocMode==="treemap" ? colorMode : "layer"} />
            </div>

            <div className="stack">
              <div className="panel">
                <PanelHead kicker={"vs "+window.CHANGE_SUMMARY.prevFiling} title="Position changes" />
                <ChangeCards />
                <div style={{ marginTop:12, display:"flex", flexDirection:"column", gap:7 }}>
                  {[window.CHANGE_SUMMARY.largestNew, window.CHANGE_SUMMARY.largestIncrease, window.CHANGE_SUMMARY.largestExit].map((m,i) => (
                    <div key={i} style={{ display:"flex", gap:8, alignItems:"baseline", fontSize:12, color:"var(--text-dim)" }}>
                      <span style={{ fontFamily:"var(--mono)", fontWeight:700, color:"var(--text)", minWidth:52 }}>{m.ticker}</span>
                      <span style={{ lineHeight:1.4 }}>{m.label}</span>
                    </div>
                  ))}
                </div>
              </div>
              <AlertsFeed />
            </div>
          </div>

          <div className="panel" style={{ marginTop:16 }}>
            <PanelHead kicker={filtered.length+" of "+H.length+" positions · click a row to drill in"} title="Holdings"
              right={<span style={{ fontFamily:"var(--mono)", fontSize:11, color:"var(--text-faint)" }}>✓ = figure from filing · ≈ rows reconstructed</span>} />
            <HoldingsTable holdings={filtered} total={totalAll} sort={sort} setSort={setSort} />
          </div>

          <div style={{ marginTop:16 }}>
            <NewsModule mode={newsMode} setMode={setNewsMode} />
          </div>

          <footer className="footer">
            <div className="discl">
              <div style={{ color:"var(--text-dim)", marginBottom:8 }}>Data provenance</div>
              Holdings sourced from SEC EDGAR 13F-HR, accession <b style={{ color:"var(--text-dim)" }}>{F.accession}</b> (period {F.periodOfReport}, filed {fmtDate(F.dateFiled)}). Filing metadata, totals, holding counts, the put/call thesis and anchor figures (✓) are from the real filing; per-line share/value figures marked ≈ are a representative reconstruction pending the live INFORMATION TABLE parse.<br />
              13Fs disclose only long U.S. equity and listed options — <b style={{ color:"var(--text-dim)" }}>not</b> short stock, bonds, cash, FX, or private holdings, so this is not the fund's full economic exposure. Notional option exposure ≠ reported 13F value. Prices/news date-stamped {fmtDate(F.dataAsOf.news.slice(0,10))}.<br />
              <span style={{ color:"var(--text)", fontWeight:600 }}>This is research, not investment advice.</span>
            </div>
          </footer>
        </main>

        <TweaksPanel>
          <TweakSection label="Aesthetic theme" />
          <TweakSelect label="Theme" value={t.theme} options={["carbon","midnight","slate","paper"]} onChange={v => setTweak("theme",v)} />
          <TweakColor label="Accent" value={t.accent} options={Object.values(ACCENTS)} onChange={v => setTweak("accent",v)} />
          <TweakRadio label="Density" value={t.density} options={["regular","compact"]} onChange={v => setTweak("density",v)} />
          <TweakSection label="Defaults" />
          <TweakRadio label="News view" value={t.defaultNews} options={["marquee","feed"]} onChange={v => { setTweak("defaultNews",v); setNewsMode(v); }} />
          <TweakRadio label="Allocation" value={t.defaultAlloc} options={["treemap","sector","donut"]} onChange={v => { setTweak("defaultAlloc",v); setAllocMode(v); }} />
        </TweaksPanel>
      </div>
    </div>
  );
}

function Legend({ mode }) {
  let items;
  if (mode==="longshort") items=[["var(--accent)","Long stock"],["var(--up)","Call options"],["var(--down)","Put options"]];
  else if (mode==="change") items=[["var(--accent)","New"],["var(--up)","Increased"],["var(--down)","Decreased"],["var(--text-faint)","Held"]];
  else items=Object.values(window.LAYERS).map(l => [l.color, l.label]);
  return (
    <div style={{ display:"flex", gap:14, flexWrap:"wrap", marginTop:14, paddingTop:12, borderTop:"1px solid color-mix(in oklab, var(--border) 55%, transparent)" }}>
      {items.map(([c,l]) => (
        <span key={l} style={{ display:"inline-flex", alignItems:"center", gap:6, fontSize:11, color:"var(--text-dim)" }}>
          <span style={{ width:9, height:9, borderRadius:2, background:c }} />{l}
        </span>
      ))}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
