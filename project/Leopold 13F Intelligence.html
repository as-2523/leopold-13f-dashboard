<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Situational Awareness LP · 13F Intelligence</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600;700&display=swap" rel="stylesheet" />
<style>
  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; }
  :root { --mono: "JetBrains Mono", ui-monospace, monospace; --sans: "Space Grotesk", system-ui, sans-serif; }
  body {
    font-family: var(--sans);
    background: var(--bg);
    color: var(--text);
    -webkit-font-smoothing: antialiased;
  }
  ::selection { background: color-mix(in oklab, var(--accent) 40%, transparent); }
  a { color: inherit; text-decoration: none; }
  ::-webkit-scrollbar { width: 10px; height: 10px; }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 6px; }
  ::-webkit-scrollbar-track { background: transparent; }

  .app { min-height: 100vh; }
  .wrap { max-width: 1320px; margin: 0 auto; padding: 0 24px; }

  /* ---------------- header ---------------- */
  .topbar { position: sticky; top: 0; z-index: 40; background: color-mix(in oklab, var(--bg) 88%, transparent); backdrop-filter: blur(14px); border-bottom: 1px solid var(--border); }
  .brandrow { display: flex; align-items: center; gap: 16px; padding: 14px 0 13px; }
  .mark { width: 36px; height: 36px; border-radius: 8px; background: var(--accent); display: grid; place-items: center; flex-shrink: 0; box-shadow: 0 0 0 1px color-mix(in oklab, var(--accent) 50%, transparent), 0 6px 18px -6px var(--accent); }
  .mark span { color: #06080c; font-weight: 700; font-size: 13px; font-family: var(--mono); letter-spacing: -.02em; }
  .metachip { font-family: var(--mono); font-size: 11px; color: var(--text-dim); display: inline-flex; align-items: center; gap: 6px; }
  .metachip b { color: var(--text); font-weight: 600; }
  .dot { width: 6px; height: 6px; border-radius: 50%; }
  .pill { font-family: var(--mono); font-size: 10.5px; letter-spacing: .03em; padding: 4px 9px; border-radius: 20px; border: 1px solid var(--border); color: var(--text-dim); white-space: nowrap; }

  .controls { display: flex; align-items: center; gap: 10px; padding: 11px 0; border-top: 1px solid color-mix(in oklab, var(--border) 60%, transparent); flex-wrap: wrap; }
  .search { display: flex; align-items: center; gap: 7px; background: var(--panel-2); border: 1px solid var(--border); border-radius: 7px; padding: 6px 10px; }
  .search input { background: none; border: none; outline: none; color: var(--text); font-family: var(--mono); font-size: 12px; width: 120px; }
  .search input::placeholder { color: var(--text-faint); }
  .selwrap select { background: var(--panel-2); border: 1px solid var(--border); border-radius: 7px; color: var(--text); font-family: var(--mono); font-size: 12px; padding: 7px 10px; cursor: pointer; outline: none; }

  /* ---------------- panels & cards ---------------- */
  .panel { background: var(--panel); border: 1px solid var(--border); border-radius: 12px; padding: 18px; }
  .kcard { background: var(--panel); border: 1px solid var(--border); border-radius: 10px; padding: 13px 14px; }
  .hero { display: grid; grid-template-columns: 1.5fr 1fr 1fr 1.2fr; gap: 1px; background: var(--border); border: 1px solid var(--border); border-radius: 12px; overflow: hidden; margin: 20px 0; }
  .herocell { background: var(--panel); padding: 17px 20px; }
  .herolabel { font-family: var(--mono); font-size: 10.5px; letter-spacing: .12em; text-transform: uppercase; color: var(--text-faint); margin-bottom: 8px; }
  .herobig { font-family: var(--mono); font-weight: 700; letter-spacing: -.01em; color: var(--text); line-height: 1; }

  .grid2 { display: grid; grid-template-columns: 1.62fr 1fr; gap: 16px; align-items: start; }
  .stack { display: flex; flex-direction: column; gap: 16px; }

  .seg { display: inline-flex; border: 1px solid var(--border); border-radius: 7px; overflow: hidden; }
  .seg button { font-family: var(--mono); font-size: 11px; letter-spacing: .03em; text-transform: uppercase; padding: 5px 11px; border: none; cursor: pointer; background: transparent; color: var(--text-dim); font-weight: 600; }
  .seg button.on { background: var(--accent); color: #06080c; }

  /* ---------------- holdings table ---------------- */
  .tablewrap { overflow-x: auto; }
  .htable { width: 100%; border-collapse: collapse; }
  .htable thead th { font-family: var(--mono); font-size: 10px; letter-spacing: .08em; text-transform: uppercase; color: var(--text-faint); font-weight: 600; text-align: left; padding: 0 10px 10px; border-bottom: 1px solid var(--border); white-space: nowrap; user-select: none; }
  .htable td { padding: 10px; border-bottom: 1px solid color-mix(in oklab, var(--border) 55%, transparent); font-size: 13px; vertical-align: middle; }
  .htable td.num { font-family: var(--mono); text-align: right; color: var(--text-dim); white-space: nowrap; }
  .hrow { cursor: pointer; transition: background .1s ease; }
  .hrow:hover { background: var(--panel-2); }
  .hrow-open { background: var(--panel-2); }
  .hrow-open td { border-bottom-color: transparent; }
  .hdetail td { background: var(--panel-2); border-bottom: 1px solid var(--border); }
  .dlabel { font-family: var(--mono); font-size: 10px; letter-spacing: .1em; text-transform: uppercase; color: var(--text-faint); margin-bottom: 8px; }

  .dense .htable td { padding: 6px 10px; font-size: 12px; }
  .dense .hero { margin: 14px 0; }
  .dense .herocell { padding: 12px 16px; }

  /* ---------------- alerts ---------------- */
  .alert { display: flex; gap: 10px; padding: 10px 11px; border: 1px solid var(--border); border-radius: 9px; cursor: pointer; transition: border-color .1s; background: var(--panel-2); }
  .alert:hover { border-color: color-mix(in oklab, var(--accent) 45%, var(--border)); }

  /* ---------------- news ---------------- */
  .marquee { overflow: hidden; border: 1px solid var(--border); border-radius: 9px; background: var(--panel-2); padding: 10px 0; mask-image: linear-gradient(90deg, transparent, #000 4%, #000 96%, transparent); }
  .marquee-track { display: inline-flex; align-items: center; white-space: nowrap; animation: scroll 70s linear infinite; }
  .marquee:hover .marquee-track { animation-play-state: paused; }
  @keyframes scroll { from { transform: translateX(0); } to { transform: translateX(-50%); } }
  .tickitem { display: inline-flex; align-items: center; gap: 8px; padding: 0 4px; }
  .ticktag { font-family: var(--mono); font-size: 9.5px; font-weight: 700; letter-spacing: .04em; color: var(--accent); background: color-mix(in oklab, var(--accent) 14%, transparent); border-radius: 3px; padding: 1px 5px; }
  .feeditem { display: flex; gap: 12px; padding: 12px 4px; border-bottom: 1px solid color-mix(in oklab, var(--border) 55%, transparent); transition: background .1s; }
  .feeditem:hover { background: var(--panel-2); }

  .footer { border-top: 1px solid var(--border); margin-top: 28px; padding: 22px 0 40px; }
  .discl { font-family: var(--mono); font-size: 11px; color: var(--text-faint); line-height: 1.7; }

  @media (prefers-reduced-motion: reduce) { .marquee-track { animation: none; } }
  @media (max-width: 940px) { .grid2 { grid-template-columns: 1fr; } .hero { grid-template-columns: 1fr 1fr; } }
</style>
</head>
<body>
