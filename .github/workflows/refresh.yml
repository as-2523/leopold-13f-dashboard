name: Daily data refresh

on:
  schedule:
    # 06:30 UTC every day (after US market close previous day)
    - cron: "30 6 * * *"
  workflow_dispatch:
    inputs:
      force_edgar:
        description: "Re-parse EDGAR XML even if filing already processed"
        type: boolean
        default: false
      skip_market:
        description: "Skip market data fetch"
        type: boolean
        default: false
      skip_news:
        description: "Skip news fetch"
        type: boolean
        default: false

permissions:
  contents: write

jobs:
  refresh:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: agents/requirements.txt

      - name: Install dependencies
        run: pip install -r agents/requirements.txt

      - name: Run data agents
        env:
          SEC_CONTACT_EMAIL: ${{ secrets.SEC_CONTACT_EMAIL }}
          NEWSAPI_KEY: ${{ secrets.NEWSAPI_KEY }}
        run: |
          FORCE_FLAG=""
          SKIP_MARKET=""
          SKIP_NEWS=""
          if [ "${{ github.event.inputs.force_edgar }}" = "true" ]; then
            FORCE_FLAG="--force-edgar"
          fi
          if [ "${{ github.event.inputs.skip_market }}" = "true" ]; then
            SKIP_MARKET="--skip-market"
          fi
          if [ "${{ github.event.inputs.skip_news }}" = "true" ]; then
            SKIP_NEWS="--skip-news"
          fi
          python agents/run_all.py $FORCE_FLAG $SKIP_MARKET $SKIP_NEWS

      - name: Commit & push if data changed
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/
          if git diff --cached --quiet; then
            echo "No data changes — nothing to commit."
          else
            TODAY=$(date -u +%Y-%m-%d)
            git commit -m "chore: daily data refresh ${TODAY}"
            git push
            echo "Data refreshed and committed."
          fi
